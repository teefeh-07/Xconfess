services:
  postgres:
    image: postgres:16-alpine
    container_name: xconfess-postgres
    environment:
      POSTGRES_DB: xconfess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - xconfess-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xconfess"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xconfess-redis
    ports:
      - "6379:6379"
    volumes:
      - xconfess-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xconfess-postgres-data:
  xconfess-redis-data:
